<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="style/style.css">
</head>
<body class="bg-gray-50">
   <section>


    <div class="bg-white shadow-md w-[90%] sm:w-[400px] md:w-[600px]  mx-auto my-30 py-8 relative z-10">
       <div class="logo text-center justify-center mt-10">
        <img class="justify-center items-center text-center mx-auto" src="assets/github-logo.png" alt="">
         <h2 class="font-bold text-3xl  ">GitHub Issues Tracker</h2>
         <p class="text-gray-400">Sign in to manage your issues</p>
       </div>
    

            <div>
              <fieldset class="fieldset mt-[24px] space-y-4">
                <label class="label pl-15 text-black font-semibold text-xl">Username</label>
                     
               <input id="user-name" type="text" class="input w-[85%] mx-auto font-semibold" placeholder="Enter User" />
               <label class="label pl-15 text-black font-semibold text-xl">Password</label>
               <input id="input-password" type="password" class="input w-[85%] mx-auto" placeholder="Enter Password" />
               
               <button id="login" class="btn btn-primary mt-4 w-[85%] mx-auto">Login</button>
               </fieldset>

            </div>

            <p class="font-semibold text-center mt-[24px]">OR</p>

            <div class="justify-center text-center mt-[24px] pb-[56px]">
                <p class="mb-30">Demo Credentials:</p>
                <p><span><span class="font-semibold text-black">Username:</span> admin</span></p>
                <p><span><span class="font-semibold text-black">Password:</span> admin123</span></p>
            </div>

       </div>
   </section>

   <script src="script.js"></script>
</body>
</html>
